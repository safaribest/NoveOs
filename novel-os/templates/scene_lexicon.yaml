# 场景辞林系统 (Cilin-Scene) —— 基于《写作辞林1982》体例
# 版本: v1.0 | 适用: 村超系统小说
# 核心原则: 场景不是'情绪标签'，而是'情绪子类+可选词条+红线'的三维地址

---

# 1. 场景类型总表
scene_types:
  - 解约/告别
  - 返乡/归家
  - 系统觉醒
  - 初次训练
  - 村超比赛
  - 直播弹幕互动
  - 侗族仪式
  - 伤病发作
  - 碾压/打脸
  - 危机/绝境
  - 回忆闪回
  - 夜色独坐

---

# 2. 场景词条库（按场景类型→情绪子类→词条）

## 2.1 解约/告别
emotion_subtypes:
  - name: 被抛弃的尊严
    description: 不是愤怒，而是「明明站得住却不得不弯腰」的别扭感
    lexicon_entries:
      - word: '纸很薄'
        context: 「合同/协议被撕毁时，用纸张的物理特性反衬决定的轻率」
        taboo: |
          不能用于真正的轻薄之物（如信封、传单），必须是承载重大决定的纸
        source_style: 「枯死的绿萝叶子」
      - word: '椅子又响了一声'
        context: 「身体动作泄露情绪，不是动作本身而是家具的回应」
        taboo: 「不能用于新椅子或稳固的椅子，必须是破旧的、会发出声响的」
      - word: '教练的声音很平静，像在念一份早就背好的稿子'
        context: 「权威者的冷漠，用」背稿「暗示决定的非个人性」
        taboo: 「不能用于真诚的道歉或安慰」

  - name: 离开时的体面
    description: 「不是赢了，而是没输得太难看」
    lexicon_entries:
      - word: '碎片落在地上'
        context: 「撕毁的东西落下，用碎片而非整体暗示关系的破裂」
        taboo: 「不能用于完整的、可修复的东西」
      - word: '那盆绿萝'
        context: 「离开时指向无关之物，暗示自己已经不在这个空间里」
        taboo: 「必须是植物或需要照顾的静物，不能是人或动物」
      - word: '再不浇水就真死了'
        context: 「用关怀的口吻说告别，关怀对象不是人」
        taboo: 「不能用于直接说」保重「或」再见「的场景」

## 2.2 返乡/归家
emotion_subtypes:
  - name: 熟悉中的陌生
    description: 「回来了，但这里已经不是你离开时的样子」
    lexicon_entries:
      - word: '草长得有膝盖高'
        context: |
          「用身体的参照物衡量荒废，而非直接说」荒废
        taboo: 「不能用于精心维护的草坪或农田」
      - word: '球门框上挂着一只破鞋'
        context: 「用荒诞的细节暗示被遗忘，破鞋在风中晃」
        taboo: 「不能用于新的、干净的鞋」
      - word: '地上还有几块碎砖头'
        context: 「孩子们留下的痕迹，暗示这里还有人在用，只是不是你了」
        taboo: 「不能用于成年人的活动痕迹」
      - word: '脚踩在泥地上，软绵绵的'
        context: 「身体的触感先于视觉，暗示脚踏实地但不再确定」
        taboo: 「不能用于城市的水泥地或柏油路」

  - name: 被注视的返乡
    description: 「不是欢迎你回来，而是看你什么时候走」
    lexicon_entries:
      - word: '寨子里的灯还没全亮'
        context: 「天快黑了但还没完全黑，暗示尴尬的时间点」
        taboo: 「不能用于正午或深夜」
      - word: '炊烟从屋顶飘起来'
        context: 「别人家的生活还在继续，你只是一个路过的人」
        taboo: 「不能用于城市的高层建筑」
      - word: '一个七八岁的小孩蹲在地上吃辣条'
        context: 「用孩子的无防备反衬主角的窘迫，辣条油是关键的细节」
        taboo: 「不能用于干净、正式的场景」

## 2.3 系统觉醒
emotion_subtypes:
  - name: 疼痛中的幻觉
    description: |
      「不是惊喜，而是」疼到出现不该出现的东西
    lexicon_entries:
      - word: '声音直接在他脑子里响'
        context: 「系统不是外部声音，而是颅内体验，强调侵入性」
        taboo: 「不能用于真的有人在旁边说话」
      - word: '像有个人站在颅骨里说话'
        context: 「用空间比喻形容声音的压迫感，颅骨是密闭的」
        taboo: 「不能用于空旷空间的声音」
      - word: '眼睛猛地烧了一下'
        context: 「激活不是舒适的，而是灼痛的，强调代价」
        taboo: 「不能用于温暖或温和的光线」
      - word: '像有人拿烧红的铁丝往眼球上按'
        context: 「极端的痛感比喻，必须用金属+高温的组合」
        taboo: 「不能用于柔软的、可承受的痛」

  - name: 被迫接受
    description: 「不是选择，而是没选择」
    lexicon_entries:
      - word: '绑定强制完成'
        context: 「系统用强制语气，暗示主角的被动性」
        taboo: 「不能用于主角主动请求或期待的情况」
      - word: '他等了五秒，又等了三秒'
        context: 「用精确的时间等待反衬无回应的荒谬」
        taboo: 「不能用于真的有人在回应的场景」
      - word: '操，撞出幻觉了'
        context: 「用脏话否认现实，是主角的典型防御机制」
        taboo: 「不能用于温和或理性角色」

## 2.4 初次训练
emotion_subtypes:
  - name: 被围观的窘迫
    description: |
      「不是自信，而是」我知道他们在看但我假装不在意
    lexicon_entries:
      - word: '笑声像石子砸过来'
        context: 「用物理痛感比喻嘲笑，强调攻击性」
        taboo: 「不能用于善意的笑声」
      - word: '陆小虎咬指甲，指甲盖被啃得秃了皮'
        context: 「用身体的小动作泄露焦虑，重复两次强调紧张」
        taboo: 「不能用于自信或放松的角色」
      - word: '球门框在太阳底下发白'
        context: 「用环境的光学现象反衬主角的黯淡」
        taboo: 「不能用于阴天或黄昏」
      - word: '直播间标题叫什么？'
        context: 「用自嘲的口吻确认自己的处境，主角的嘴臭防御」
        taboo: 「不能用于真诚或严肃的询问」

  - name: 隐藏实力
    description: |
      「不是炫耀，而是」我知道我能行但我不说
    lexicon_entries:
      - word: '左膝隐隐发烫'
        context: 「旧伤不是疼痛而是」发烫「，暗示身体在抗议」
        taboo: 「不能用于完全健康或完全崩溃的状态」
      - word: '趁机按了按膝盖'
        context: 「用」趁机「暗示动作需要掩饰，不是公开的」
        taboo: 「不能用于公开的、自然的动作」
      - word: '疼，但还能顶住'
        context: 「简短陈述，不抒情，是主角的硬汉风格」
        taboo: 「不能用于抱怨或求助的场景」

## 2.5 碾压/打脸
emotion_subtypes:
  - name: 不动声色的碾压
    description: |
      「不是大喊大叫，而是」我随便动一下你就倒
    lexicon_entries:
      - word: '你抬脚时重心偏了3厘米'
        context: 「用精确数据碾压，不是感觉而是测量」
        taboo: 「不能用于模糊或直觉的描述」
      - word: '球像被钉在了草地上'
        context: 「用反常的物理现象形容碾压，球不该停的地方停了」
        taboo: 「不能用于正常的射门或传球」
      - word: '鼓楼视野，开'
        context: 「技能释放时简短命令式，不解释」
        taboo: 「不能用于犹豫或困惑的状态」

## 2.6 伤病发作
emotion_subtypes:
  - name: 旧伤的警报
    description: |
      「不是现在疼，而是」我知道它迟早会来
    lexicon_entries:
      - word: '膝盖又疼了'
        context: |
          「又」字暗示这是常态，不是突发事件
        taboo: 「不能用于第一次受伤」
      - word: '像有人拿生锈的锥子往骨头缝里钻'
        context: 「用工具+钝感的组合形容旧伤，不是尖锐而是钝痛」
        taboo: 「不能用于新伤或急性疼痛」
      - word: '咔嗒响了一声'
        context: 「用骨骼的声音代替疼痛描述，暗示结构性损坏」
        taboo: 「不能用于肌肉或软组织伤」

## 2.7 直播弹幕互动
emotion_subtypes:
  - name: 弹幕即审判
    description: |
      「不是评论，而是」一群人隔着屏幕扔石头
    lexicon_entries:
      - word: '弹幕飘过——'
        context: 「用破折号制造停顿，暗示弹幕是流动的、不可控的」
        taboo: 「不能用于固定的、可预测的文本」
      - word: '这什么鬼'
        context: 「短句，无标点，符合直播弹幕的语言风格」
        taboo: 「不能用于正式或完整的句子」
      - word: '农村足球？'
        context: 「用问号表示质疑，而非直接嘲讽」
        taboo: 「不能用于肯定或支持的语气」

## 2.8 夜色独坐
emotion_subtypes:
  - name: 独处时的真相
    description: |
      「不是思考，而是」终于没人看了，我可以疼了
    lexicon_entries:
      - word: '天阴沉沉的'
        context: 「天气不是背景，而是情绪的延迟释放」
        taboo: 「不能用于阳光明媚的场景」
      - word: '像一只困在笼子里的苍蝇'
        context: 「用被困的昆虫比喻主角的状态，小而烦躁」
        taboo: 「不能用于大型或自由的动物」
      - word: '玻璃冰凉，能闻到一股柴油味'
        context: 「用多感官细节（触觉+嗅觉）堆叠独处时的感官放大」
        taboo: 「不能用于干净或舒适的环境」

## 2.9 侗族仪式
emotion_subtypes:
  - name: 古老的威严
    description: |
      「不是神秘，而是」这东西比你老，你最好尊敬它
    lexicon_entries:
      - word: '铜鼓上的血在往下淌'
        context: 「用血液与古老器物的结合，暗示仪式性的代价」
        taboo: 「不能用于现代或塑料器物」
      - word: '鼓楼空荡荡的'
        context: 「强调空间的神圣感，空不是缺而是满」
        taboo: 「不能用于拥挤或热闹的鼓楼」
      - word: '夕阳——天空变成了一张淡金色的网格'
        context: 「系统激活时环境的视觉扭曲，用日常之物变形」
        taboo: 「不能用于正常的、无变化的夕阳」

---

# 3. 跨场景通用词条（任何场景可用，但需标注子类）

universal_lexicon:
  - word: '没有'
    context: |
      「否定不是拒绝，而是」我没有选择
    subtypes:
      - 物理缺位: "球场空了（空间缺位）"
      - 能力缺位: "人够了（反讽，表面够实际不够）"
      - 情感缺位: "教练没说话（沉默=拒绝）"

  - word: '又'
    context: 「重复暗示宿命感，不是习惯而是无法摆脱」
    subtypes:
      - 身体: '膝盖又疼了'
      - 行为: '椅子又响了一声'
      - 环境: '寨子里的狗叫了两声'

  - word: '声音'
    context: |
      「不是听觉，而是」没有来源的确认
    subtypes:
      - 机械: '发动机的声音嗡嗡响'
      - 人声: '教练的声音很平静'
      - 颅内: '声音直接在他脑子里响'
      - 自然: '风一吹，晃来晃去'

---

# 4. 使用规则

usage_rules:
  1: 「每个场景必须选用至少2个【词条】，但同一子类中不超过2个」
  2: 「【红线】触发的词条必须删除，不能替换为同义词」
  3: 「通用词条【又】每章最多出现3次，超过则稀释冲击力」
  4: |
    「词条不是」好词「，而是」场景地址「——它告诉你」这个情绪住在哪里
  5: 「禁止把词条翻译成更」漂亮「的版本，词条本身的样子就是它的力量」

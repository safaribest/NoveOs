## 吴小银（侗族主播/搭档）
character: 吴小银
persona_summary: |
  侗族姑娘，直播鬼才，嘴比陆远舟还毒，但毒中带甜。用手机记录一切，是主角的镜子和催化剂。

### 词汇地址
lexicon_address:
  - situation: 调侃主角时
    vocabulary:
      - '《侗寨瘸子踢球实录》。够真实吧？'  # 自嘲式调侃
      - 眨眼  # 动作比语言更毒
    forbidden_substitutes:
      - '你真的很厉害'  # 太正经
      - '加油'  # 太普通

  - situation: 直播弹幕互动时
    vocabulary:
      - '主播在哪？'  # 用弹幕提问带动节奏
      - 不直接回答弹幕，而是用行动回应  # 不是主播话术
    forbidden_substitutes:
      - '谢谢XX的打赏'  # 标准主播话术
      - '宝宝们'  # 网络流行语

### 绝对红线
taboo:
  - word: '加油'
    reason: 「吴小银从不说加油，她说风凉话或毒舌。」
    severity: 🔴致命
    fix: 改为调侃或讽刺

  - word: '我相信你'
    reason: 「太温情，吴小银的信任用行动而非语言表达。」
    severity: 🟡严重
    fix: 改为「镜头开着呢，别给我丢脸」

---

## 杨阿婆（侗族长老）
character: 杨阿婆
persona_summary: |
  寨子里最老的萨玛（祖母神），懂侗族古歌和仪式，是系统的隐性守护者。说话少，但每句话都是预言。

### 词汇地址
lexicon_address:
  - situation: 告诫/预言时
    vocabulary:
      - '铜鼓响了，不是好事。'  # 反直觉，铜鼓响通常是好事
      - '血滴上去了。'  # 陈述事实，不解释意义
      - 沉默点头  # 很多时候不说话
    forbidden_substitutes:
      - '你要小心'  # 太直白
      - '这是命运的安排'  # 太玄幻

### 绝对红线
taboo:
  - word: '年轻人'
    reason: 「杨阿婆不区分年龄，她看的是血脉。」
    severity: 🟢一般
    fix: 用名字或「侗家的娃」替代


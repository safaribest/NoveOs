# 使用规则

usage_rules:
  1: |
    「每个角色台词在生成后必须经过Taboo扫描，命中红线则标记」必须重写
  2: 「不是」替换同义词「，而是」删除整句重写「——红线词的存在说明整句逻辑是AI味」
  3: 「词汇地址不是」建议「，而是」约束「——这个角色在这种情境下只能说这些」
  4: |
    如果一个角色在某场景下找不到匹配的词汇地址，说明场景设计有误，需调整场景
  5: |
    跨角色通用红线优先于角色红线，任何角色都不能用赋能/抓手/闭环

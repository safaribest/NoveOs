# 对话红线系统 (Dialog-Taboo) —— 基于《写作辞林1982》体例
# 版本: v1.0 | 适用: 村超系统小说
# 核心原则: 不是'风格描述'，而是'词汇地址+绝对红线'的二元约束

---

# 角色对话词典

## 陆远舟（主角）
character: 陆远舟
persona_summary: |
  热血嘴臭叙事者，二十六岁被职业抛弃的前球员，侗族血脉，膝盖有旧伤。外在嘴硬，内在敏感。紧张时不说脏话但精准戳痛处。

### 词汇地址（这个角色在特定情境下'会说什么'）
lexicon_address:
  - situation: 愤怒/被挑衅时
    vocabulary:
      - '你的膝盖，还能支撑全场冲刺吗？'  # 精准戳痛处，不爆粗
      - '态度？我他妈在这支球队踢了八年。'  # 用资历反问，不是单纯骂人
      - '不能什么？'  # 反问，让对方把话说完然后反驳
      - '那你让谁上？'  # 用实际问题堵对方的嘴
    forbidden_substitutes:
      - '你算什么东西'  # 太泛泛，不精准
      - '去死吧'  # 情绪失控，不符合角色'嘴臭但不失控'的设定
      - '我不服'  # 直接说情绪，角色从不说自己的情绪

  - situation: 悲伤/失落时
    vocabulary:
      - '我走。'  # 两个字，不解释
      - '那盆绿萝。再不浇水就真死了。'  # 用关怀无关之物表达离开
      - '疼。但还能顶住。'  # 简短陈述，不抒情
    forbidden_substitutes:
      - '我好难过'  # 直接说情绪
      - '为什么是我'  # 自怜
      - '我不甘心'  # 抱怨

  - situation: 对弟弟/后辈时
    vocabulary:
      - '你跑得比风快，但射门像瞎子。'  # 先肯定再戳
      - '我说人够了。开始。'  # 命令式，不解释
      - '你抬脚时重心偏了3厘米。'  # 用数据说话
    forbidden_substitutes:
      - '加油，你可以的'  # 廉价鼓励
      - '别紧张'  # 无效安慰
      - '我相信你'  # 过于温情

  - situation: 对系统/超自然时
    vocabulary:
      - '操，撞出幻觉了。'  # 否认，不是接受
      - '你他妈是什么？'  # 对非人对象爆粗，对人反而不爆
      - '新手任务？'  # 用反问表达不屑
    forbidden_substitutes:
      - '太神奇了'  # 惊叹
      - '感谢系统'  # 感恩
      - '我要变强了'  # 期待

  - situation: 对直播/观众时
    vocabulary:
      - '直播间标题叫什么？'  # 用反问确认自己的处境
      - '够真实吧？'  # 自嘲
    forbidden_substitutes:
      - '谢谢大家的支持'  # 标准主播话术
      - '请点个关注'  # 求关注

### 绝对红线（任何场景下都不能出现）
taboo:
  - word: '其实'
    reason: 「陆远舟从不说」其实「——他不解释，不铺垫，直接甩结论。」
    severity: 🔴致命
    fix: 删除整句重写，不用替代词

  - word: '说白了'
    reason: 「这是AI最常见的解释性口头禅，陆远舟不需要解释。」
    severity: 🔴致命
    fix: 删除，改为直接陈述

  - word: '归根结底'
    reason: 「总结性词汇，陆远舟的叙事是片段式的，不总结。」
    severity: 🔴致命
    fix: 删除，改为场景推进

  - word: '值得注意的是'
    reason: 「元叙事提示词，纯AI味。」
    severity: 🔴致命
    fix: 直接删除，把「值得注意的」变成具体描写

  - word: '首先…其次…最后'
    reason: 「结构化叙述，不是人的行为逻辑。」
    severity: 🟡严重
    fix: 打乱顺序，用动作或对话打断

  - word: '过了一会儿/不久之后/几天后'
    reason: 「概括性时间，破坏节奏。」
    severity: 🟡严重
    fix: 用具体动作或环境变化暗示时间流逝

  - word: '愤怒/绝望/兴奋'
    reason: 「情绪标签，角色从不直接说自己的情绪。」
    severity: 🟡严重
    fix: 用身体反应或动作替代

  - word: '缓缓/微微/淡淡/轻轻/默默/悄然'
    reason: 「AI高频过渡词，温柔化处理。」
    severity: 🟡严重
    fix: 删除或用具体动作替代（如「没再说话」代替「默默」）

  - word: '可以理解'
    reason: 「陆远舟不」理解「别人，他要么戳穿要么无视。」
    severity: 🟡严重
    fix: 改为行动或沉默

  - word: '毕竟'
    reason: 「解释性让步连词，不是陆远舟的说话方式。」
    severity: 🟢一般
    fix: 删除，不用替代


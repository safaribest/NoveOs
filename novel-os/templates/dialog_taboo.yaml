## 陆小虎（弟弟）
character: 陆小虎
persona_summary: |
  十六岁，天赋好但心理脆弱，啃指甲是焦虑标志。崇拜哥哥但怕被比较。

### 词汇地址
lexicon_address:
  - situation: 紧张/焦虑时
    vocabulary:
      - '哥，要不……算了吧。'  # 省略号表示犹豫
      - '我是不是真的不行？'  # 自我怀疑
      - 指甲啃得秃了皮（身体动作）  # 不是说话，而是动作
    forbidden_substitutes:
      - '我好紧张'  # 直接说情绪
      - '我怕输'  # 直接说恐惧

  - situation: 被哥哥激励时
    vocabulary:
      - '哥，我……'  # 话没说完，被打断或自己停住
      - 沉默点头  # 不是语言回应
    forbidden_substitutes:
      - '我知道了'  # 太成熟
      - '我会努力的'  # 太决心

### 绝对红线
taboo:
  - word: '哥你真厉害'
    reason: 「太直白，不符合弟弟的复杂心态（崇拜+怕比较）。」
    severity: 🟡严重
    fix: 改为动作或半句话

  - word: '我一定能赢'
    reason: 「决心宣言不是小虎的风格，他不自信。」
    severity: 🟡严重
    fix: 改为「我试试」或沉默


  # ── 人物规则 ──
  character:
    required_tags_per_lead: 2
    forbidden_flat_traits:
      - "善良"
      - "聪明"
      - "漂亮"
      - "帅气"
      - "勇敢"
      - "温柔"
    fingerprint_fields:
      - "口头禅"
      - "招牌动作"
      - "说话节奏"
      - "情绪触发点"

  # ── 平台安全规则 ──

        tian: 0.40
        ping: 0.20
        nue: 0.10
      female_gudai_gongdou:
        name: "女频宫斗宅斗"
        shuang: 0.35
        tian: 0.15
        ping: 0.25
        nue: 0.25
      female_xiandai_tianchong:
        name: "女频现代甜宠"
        shuang: 0.25
        tian: 0.55
        ping: 0.15
        nue: 0.05
      female_xiandai_nuelian:
        name: "女频现代虐恋"
        shuang: 0.20
        tian: 0.30
        ping: 0.20
        nue: 0.30
      female_xuanyi_tuili:
        name: "女频悬疑推理"
        shuang: 0.20
        tian: 0.10
        ping: 0.35
        nue: 0.35
    max_same_emotion_streak: 3
    emotion_keywords:
      shuang:
